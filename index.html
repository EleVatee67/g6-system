<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OsloRP G6 System</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
      }
      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <iframe id="app" src="about:blank" allow="clipboard-read; clipboard-write"></iframe>
    <script>
      const iframe = document.getElementById("app");
      const demoFile = "demo_podgl%C4%85d.html";
      const passthrough = `${window.location.search || ""}${window.location.hash || ""}`;
      iframe.src = `${demoFile}${passthrough}`;

      if (window.location.search || window.location.hash) {
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    </script>
  </body>
</html>
